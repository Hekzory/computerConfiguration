- name: Arch-core.yml - base setup for arch
  hosts: arch
  become: false
  vars:
    the_user: "{{ ansible_facts['user_id'] }}"
    user_home: "{{ ansible_facts['env'].HOME }}"
    is_wsl: "{{ 'microsoft' in (ansible_facts['kernel'] | lower) }}"
    pacman_parallel_downloads: 16
    suppress_pam_systemd_home_warning: true
  handlers:
    - name: Apply sysctl
      become: true
      listen: sysctl_changed
      ansible.builtin.command: sysctl --system
      changed_when: true
    - name: Restart NetworkManager
      become: true
      listen: networkmanager_changed
      ansible.builtin.service:
        name: NetworkManager
        state: restarted
      when: not (is_wsl | bool)
    - name: Restart systemd-resolved
      become: true
      listen: resolved_changed
      ansible.builtin.service:
        name: systemd-resolved
        state: restarted
      when: not (is_wsl | bool)
    - name: Restart docker
      become: true
      listen: docker_changed
      ansible.builtin.service:
        name: docker.service
        state: restarted
      failed_when: false
      when: not (is_wsl | bool)
    - name: Regenerate initramfs
      become: true
      listen: initramfs_changed
      ansible.builtin.command: mkinitcpio -P
      changed_when: true
      when: not (is_wsl | bool)
    - name: Reload systemd
      become: true
      listen: systemd_reload
      ansible.builtin.systemd:
        daemon_reload: true
  tasks:
    - name: Verify running on Arch Linux
      ansible.builtin.assert:
        that: ansible_facts['distribution'] == "Archlinux"
        fail_msg: "This playbook requires Arch Linux (detected: {{ ansible_facts['distribution'] }})"
        success_msg: "Arch Linux confirmed"
    # MACHINE CLASS - two profiles: laptop (battery-aware) vs not (performance-first).
    # Auto-detected from battery presence; override with -e is_laptop=true|false.
    # Mirrors the is_wsl pattern. Only settings whose sole justification is raw
    # performance flip on laptops; stability-motivated ones (NVMe APST, NVMe
    # runtime PM) stay on for every machine.
    - name: Detect battery (laptop heuristic)
      ansible.builtin.find:
        paths: /sys/class/power_supply
        patterns: 'BAT*'
        file_type: any
      register: battery_scan
      changed_when: false
      check_mode: false
    - name: Set is_laptop fact
      ansible.builtin.set_fact:
        # | bool so an -e is_laptop=false override (a string) isn't treated as truthy
        is_laptop: "{{ (is_laptop | default((battery_scan.matched | int) > 0)) | bool }}"
    # CONFIG - Pacman
    - name: Pacman - Enable color, ParallelDownloads, ILoveCandy, VerbosePkgLists, PrettyProgressBar # , and NoExtract fix for warnings
      become: true
      ansible.builtin.lineinfile:
        path: /etc/pacman.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        insertafter: "{{ item.insertafter | default(omit) }}"
      loop:
        # this one removes warnings but may break something, you are free to comment it
        - {regexp: '^#NoExtract', line: 'NoExtract = usr/lib/security/pam_systemd_home.so' }
        - {regexp: "^#Color$", line: "Color"}
        - {regexp: "^#?ParallelDownloads.*$", line: "ParallelDownloads = 16"}
        - {regexp: "^#ILoveCandy$", line: "ILoveCandy"}
        - {regexp: "^#VerbosePkgLists$", line: "VerbosePkgLists"}
        # PrettyProgressBar is CachyOS-patched-pacman only; anchor insert so stock Arch doesn't land it past the last [repo]
        - {regexp: "^#?PrettyProgressBar$", line: "PrettyProgressBar", insertafter: "^ParallelDownloads"}
      loop_control:
        label: "{{ item.line }}"
    # CONFIG - nano
    - name: Nano - Enable color in config
      become: true
      ansible.builtin.lineinfile:
        path: /etc/nanorc
        line: "{{ item.line }}"
      loop:
        - {line: 'include "/usr/share/nano/extra/*.nanorc"'}
        - {line: 'include "/usr/share/nano/*.nanorc"'}
      loop_control:
        label: "{{ item | truncate(40) }}"
    # PACKAGES - Upgrade
    - name: Full system upgrade via pacman
      become: true
      community.general.pacman:
        update_cache: true
        upgrade: true
    # PACKAGES - Setup
    - name: Full system upgrade via pacman and setup base needed packages
      become: true
      community.general.pacman:
        name:
          # Core Utilities - The Basics, But Better
          - nano # When vim feels like overkill
          - less # For when you need to scroll *gracefully*
          - git # Version control
          - base-devel # Because we build things here
          - curl # HTTP wizardry
          - wget # When curl feels too fancy
          - rsync # Moving bits, atomically
          # Enhanced Experience
          - bat # cat with wings
          - fastfetch # System introspection with style
          - btop # Resource monitoring as an art form
          - eza # ls evolved - because progress matters
          - inxi # System insights, delivered with precision
          # Performance Enhancers - Speed is a feature
          - pigz # Parallel gzip - because waiting is obsolete
          - pbzip2 # Parallel bzip - same story
          - lld # Linking at the speed of thought
          - openmp # Parallel processing? Yes, please
          - ccache # Cache your builds
          - ananicy-cpp # Auto-nice daemon - snappier foreground apps
          # Development Arsenal - Tools of the Trade
          - docker # Containers
          - docker-compose # Orchestra conductor for your containers
          - docker-buildx # Because building should be an experience
          - neovim # Text editing ascended
          - git-delta # Diffs that tell a story
          - stylua # Lua, but make it pretty
          - taplo-cli # TOML formatter - because structure matters
          - pnpm # Package management at light speed
          - npm # The necessary evil
          - fish # Shell evolution in progress
          - gopls # Go lsp server
          - ruff # Python's new best friend
          - shfmt # Because shell scripts deserve love too
          - yamlfmt # yaml formatter
          # System Essentials - The Foundation
          - fwupd # Firmware: the forgotten update
          - amd-ucode # AMD microcode - because bare metal matters
          - linux-firmware # The kernel's wardrobe
          - networkmanager # Network whisperer
          - python3 # The snake that powers everything
          - reflector # Mirror optimization magic
          - pacman-contrib # paccache, pactree, checkupdates and friends
          # Quality of Life - Because life's too short for bad tools
          - ripgrep # grep at speed
          - fzf # Fuzzy finding
          - duf # Disk usage, but beautiful
          - wl-clipboard # Wayland clipboard
          - tree-sitter-cli # AST manipulation
          - fd # fast find alternative
          - zoxide # smart cd that learns frequent dirs
          - tealdeer # tldr in rust - usage examples without the man-page slog
        state: present
    # CONFIG - GIT
    - name: Set gitconfig to personal preference at ~/.gitconfig
      community.general.git_config:
        scope: global
        name: "{{ item.name }}"
        value: "{{ item.value }}"
      loop:
        - {name: "diff.indentHeuristic", value: "true"}
        - {name: "diff.algorithm", value: "histogram"}
        - {name: "diff.colorMoved", value: "default"}
        - {name: "core.pager", value: "delta"}
        - {name: "interactive.diffFilter", value: "delta --color-only"}
        - {name: "delta.navigate", value: "true"}
        - {name: "merge.conflictstyle", value: "zdiff3"}
        - {name: "pull.rebase", value: "true"}  # rebase instead of merge on pull
        - {name: "rebase.autoStash", value: "true"}  # auto-stash before rebase
        - {name: "rebase.updateRefs", value: "true"}
        - {name: "push.default", value: "current"}  # push current branch
        - {name: "push.autoSetupRemote", value: "true"}  # auto-track remote
        - {name: "fetch.prune", value: "true"}  # remove deleted remote branches
        - {name: "fetch.pruneTags", value: "true"}
        - {name: "core.preloadindex", value: "true"}
        - {name: "core.untrackedCache", value: "true"}
        - {name: "help.autocorrect", value: "20"}  # auto-correct typos after 2 sec
        - {name: "rerere.enabled", value: "true"} # smarter conflict resolution
      loop_control:
        label: "{{ item.name }}"
    # CONFIG - OPTIMIZATION AND COMPATIBILITY
    - name: Fstab - change relatime to noatime
      become: true
      when: not (is_wsl | bool)
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '\brelatime\b'  # single quotes: keep literal \b word-boundaries (double quotes make YAML emit a backspace byte)
        replace: "noatime"
        backup: true
    - name: Ensure file exists
      become: true
      ansible.builtin.copy:
        content: ""
        dest: "/etc/sysctl.d/99-sysctl.conf"
        force: false
        group: root
        owner: root
        mode: u+rw,g+r,o+r
    - name: Configure sysctl for better performance
      become: true
      failed_when: false # some of them might not be applied dynamically or at all in some systems
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        sysctl_file: "/etc/sysctl.d/99-sysctl.conf"
        state: present
        reload: false
      loop:
        - {key: "net.core.somaxconn", value: "8192"}
        - {key: "net.ipv4.tcp_fastopen", value: "3"}
        - {key: "kernel.nmi_watchdog", value: "0"}
        - {key: "kernel.split_lock_mitigate", value: "0"} # Let split-lock programs run instead of killing them
        - {key: "net.core.default_qdisc", value: "fq"}
        - {key: "net.ipv4.tcp_congestion_control", value: "bbr"}
        - {key: "net.ipv4.tcp_max_syn_backlog", value: "8192"}
        - {key: "net.ipv4.tcp_mtu_probing", value: "1"}
        - {key: "net.ipv4.tcp_slow_start_after_idle", value: "0"}
        - {key: "net.ipv4.tcp_ecn", value: "1"} # ECN for better congestion control with bbr
        - {key: "net.ipv4.tcp_tw_reuse", value: "1"} # Reuse TIME_WAIT sockets (safe for client)
        # Allow larger per-socket buffers
        - {key: "net.core.rmem_max", value: "67108864"}        # 64 MiB
        - {key: "net.core.wmem_max", value: "67108864"}        # 64 MiB
        - {key: "net.core.rmem_default", value: "1048576"}     # 1 MiB
        - {key: "net.core.wmem_default", value: "1048576"}     # 1 MiB
        - {key: "net.ipv4.udp_rmem_min", value: "16384"}
        - {key: "net.ipv4.udp_wmem_min", value: "16384"}
      loop_control:
        label: "{{ item.key }}"
      notify: sysctl_changed

    - name: Disable unnecessary services
      become: true
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      register: service_command_output
      failed_when: >
        service_command_output.failed
        and 'unrecognized service' not in service_command_output.msg
        and 'Could not find the requested service' not in service_command_output.msg
      loop:
        - ModemManager.service # Not needed by most people, so disable by default
    - name: Manage hardware-dependent services (disabled on WSL)
      become: true
      ansible.builtin.service:
        name: "{{ item }}"
        state: "{{ 'stopped' if (is_wsl | bool) else 'started' }}"
        enabled: "{{ not (is_wsl | bool) }}"
      loop:
        - fstrim.timer
        - fwupd-refresh.timer
    - name: Copy reflector config - to setup proper mirror update
      become: true
      ansible.builtin.copy:
        src: "etc/xdg/reflector/reflector.conf"
        dest: "/etc/xdg/reflector/reflector.conf"
        force: true
        owner: "root"
        group: "root"
        mode: u+rw,g+r,o+r
    - name: Enable necessary services
      become: true
      ansible.builtin.service:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - reflector.timer
        - docker.socket
        - paccache.timer # weekly pacman cache trim, keeps last 3 versions
        - ananicy-cpp.service # auto-nice for responsiveness
    - name: Blacklist unnecessary modules
      become: true
      when: not (is_wsl | bool)
      community.general.kernel_blacklist:
        name: "{{ item }}"
        state: present
      loop:
        - pcspkr # motherboard speaker, useless
        - snd_pcsp # motherboard speaker, useless
        - eeepc_wmi # useless errors/warnings for many pcs, not useful unless you have eeepc laptop
        - iTCO_wdt # watchdog timer, small performance improvement
        - sp5100_tco # watchdog timer, small performance improvement
        - floppy # useless, also bad for security
        - parport # parallel port support, rarely used nowadays
        - ppdev # parallel port device support, rarely used
        - legion_laptop # should used by legion laptops, but wrongly loaded by every device i have
    - name: Optimize makepkg - parallel builds and compression
      become: true
      ansible.builtin.lineinfile:
        path: /etc/makepkg.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        # -l caps parallelism by load so memory-bound builds (llvm/rust/chromium) back off instead of OOMing
        - { regexp: '^#?MAKEFLAGS=', line: 'MAKEFLAGS="-j$(nproc) -l$(nproc)"' }
        # enable ccache (default BUILDENV ships it off via !ccache) so AUR rebuilds reuse object cache
        - { regexp: '^#?BUILDENV=', line: 'BUILDENV=(!distcc color ccache check !sign)' }
        - { regexp: '^COMPRESSGZ=', line: 'COMPRESSGZ=(pigz -c -f -n)' }
        - { regexp: '^COMPRESSBZ2=', line: 'COMPRESSBZ2=(pbzip2 -c -f)' }
        - { regexp: '^COMPRESSXZ=', line: 'COMPRESSXZ=(xz -c -z --threads=0 -)' }
        - { regexp: '^COMPRESSZST=', line: 'COMPRESSZST=(zstd -c -z -q --threads=0 -)' }
      loop_control:
        label: "{{ item.line }}"
    - name: Set ccache maximum size
      ansible.builtin.command: ccache --max-size=10G
      changed_when: false
    # CONFIG - udev (static rules with no per-class delta)
    - name: Udev settings - static performance rules
      become: true
      when: not (is_wsl | bool)
      ansible.builtin.copy:
        src: "etc/udev/rules.d/60-ioschedulers.rules" # ioscheduler + NVMe runtime PM (kept on for stability)
        dest: "/etc/udev/rules.d/60-ioschedulers.rules"
        force: true
        owner: "root"
        group: "root"
        mode: u+rw,g+r,o+r
    # CONFIG - udev (class-aware: laptop relaxes SATA/USB/net power for battery)
    - name: Udev settings - class-aware power rules
      become: true
      when: not (is_wsl | bool)
      ansible.builtin.template:
        src: "templates/{{ item }}.j2"
        dest: "/etc/udev/rules.d/{{ item }}"
        owner: "root"
        group: "root"
        mode: u+rw,g+r,o+r
      loop:
        - 50-sata.rules # ALPM: max_performance, or med_power_with_dipm on laptop
        - 70-usb.rules # autosuspend: off, or on (minus HID/audio) on laptop
        - 71-net.rules # ethernet power: on, or auto on laptop
    - name: Check if yay is installed
      ansible.builtin.stat:
        path: /usr/bin/yay
      register: yay_installed
    # AUR Setup
    - name: Install yay using makepkg if it isn't installed already
      kewlfft.aur.aur:
        name: yay
        use: makepkg
        state: present
      when: not yay_installed.stat.exists
    # PACKAGES - AUR packages setup
    - name: Ensure wrong packages are absent
      become: true
      community.general.pacman:
        name:
          - zsh-theme-powerlevel10k # unsupported even though present in official repos, should be replaced by git version anyway if used at all
          - zsh-theme-powerlevel10k-git # also not supported anymore so remove it for good
          - oh-my-posh-git # git version is updated ten times a day
          - oh-my-posh # compiled version may break sometimes
          - zsh-syntax-highlighting # we are going to install a better alternative, this one not used anymore
          - lsd # replaced by eza
        state: absent
    - name: Install packages from AUR using yay
      kewlfft.aur.aur:
        name:
          - oh-my-posh-bin # most stable one
        use: yay
        state: present
    # CONFIG - change shell
    - name: Change shell to fish
      become: true
      ansible.builtin.user:
        shell: /bin/fish
        name: "{{ the_user }}"
    # CONFIG - shell/editor configs setup
    # Auto-discovered from user_home/ via filetree — add a dotfile by dropping it
    # in the tree, no playbook edit needed. Covers desktop-only configs too (kitty,
    # zed, chrome flags); harmless on non-desktop since the apps aren't installed.
    - name: Create dotfile directory tree under $HOME
      ansible.builtin.file:
        path: "{{ user_home }}/{{ item.path }}"
        state: directory
        owner: "{{ the_user }}"
        group: "{{ the_user }}"
        mode: '0755'
      loop: "{{ lookup('community.general.filetree', 'user_home/') }}"
      loop_control:
        label: "{{ item.path }}"
      when: item.state == 'directory'
    - name: Deploy dotfiles
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "{{ user_home }}/{{ item.path }}"
        force: true
        owner: "{{ the_user }}"
        group: "{{ the_user }}"
        mode: u+rw,g+r,o--
      loop: "{{ lookup('community.general.filetree', 'user_home/') }}"
      loop_control:
        label: "{{ item.path }}"
      when: item.state == 'file'
    # DOCKER
    - name: Add existing user to group docker and wheel if not present
      become: true
      ansible.builtin.user:
        name: "{{ the_user }}"
        groups:
          - wheel
          - docker
        append: true
    - name: Docker cache cleanup
      failed_when: false # It's ok if cleanup fails, let's not break the whole playbook over this
      changed_when: false
      community.docker.docker_prune:
        containers: true
        images: true
        networks: true
        builder_cache: true
    # SCHEDULED docker hygiene - light prune between playbook runs
    # The aggressive prune above runs only when ansible runs; this timer
    # picks up the slack on weeks where the playbook isn't touched.
    # Intentionally NO -a and NO --volumes here: weekly auto-volume nuking is a footgun.
    - name: Install docker-prune.service - weekly light prune
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker-prune.service
        content: |
          [Unit]
          Description=Light prune of unused Docker resources
          Documentation=man:docker-system-prune(1)
          After=docker.service
          Requires=docker.service
          ConditionPathExists=/var/run/docker.sock

          [Service]
          Type=oneshot
          ExecStart=/usr/bin/docker system prune -f
        owner: root
        group: root
        mode: '0644'
      when: not (is_wsl | bool)
      notify: systemd_reload
    - name: Install docker-prune.timer - weekly trigger
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker-prune.timer
        content: |
          [Unit]
          Description=Weekly Docker prune timer

          [Timer]
          OnCalendar=weekly
          Persistent=true
          RandomizedDelaySec=30min
          Unit=docker-prune.service

          [Install]
          WantedBy=timers.target
        owner: root
        group: root
        mode: '0644'
      when: not (is_wsl | bool)
      notify: systemd_reload
    - name: Flush handlers so the new units are visible before enable
      ansible.builtin.meta: flush_handlers
    - name: Enable docker-prune.timer
      become: true
      ansible.builtin.service:
        name: docker-prune.timer
        state: started
        enabled: true
      when: not (is_wsl | bool)
    # CONFIG - pnpm
    - name: Install global pnpm packages
      # ignore_errors: true
      community.general.pnpm:
        name: "{{ item }}"
        state: latest
        global: true
      loop:
        - prettier # formatting in neovim and in general
        - neovim # neovim integration

    - name: Configure WiFi power saving and optimization
      become: true
      ansible.builtin.template:
        src: templates/iwlwifi.conf.j2  # power_save flips on laptop; everything else stays performance-first
        dest: /etc/modprobe.d/iwlwifi.conf
        mode: '0644'
      when: not (is_wsl | bool)

    - name: Disable NVMe APST (avoid deep power-state stalls/disconnects)
      become: true
      ansible.builtin.copy:
        dest: /etc/modprobe.d/nvme.conf
        content: |
          # Cap NVMe power-state transition latency at 0us, which forbids the
          # driver from selecting any non-operational (low-power) state via APST.
          # Trades idle power for stability and consistent latency.
          options nvme_core default_ps_max_latency_us=0
        mode: '0644'
      when: not (is_wsl | bool)
      notify: initramfs_changed

    # systemd-resolved: tune TLS/DNSSEC/cache only; leave servers to NM per-connection
    - name: Ensure systemd-resolved drop-in directory exists
      become: true
      ansible.builtin.file:
        path: /etc/systemd/resolved.conf.d
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: not (is_wsl | bool)

    - name: Configure systemd-resolved - DoT, DNSSEC, cache
      become: true
      ansible.builtin.copy:
        dest: /etc/systemd/resolved.conf.d/10-dns.conf
        content: |
          [Resolve]
          DNSOverTLS=opportunistic
          DNSSEC=allow-downgrade
          Cache=yes
        owner: root
        group: root
        mode: '0644'
      when: not (is_wsl | bool)
      notify: resolved_changed

    # NVIDIA container runtime: detect GPU first so non-NVIDIA hosts skip cleanly
    - name: Detect NVIDIA GPU via PCI vendor ID
      ansible.builtin.command:
        cmd: "lspci -d 10de::"
      register: nvidia_gpu_detect
      changed_when: false
      check_mode: false
      when: not (is_wsl | bool)

    - name: Install nvidia-container-toolkit when NVIDIA GPU is present
      become: true
      community.general.pacman:
        name:
          - nvidia-container-toolkit
        state: present
      when:
        - not (is_wsl | bool)
        - nvidia_gpu_detect.stdout | default('') | length > 0

    - name: Read current docker daemon.json (if any)
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: docker_daemon_raw
      failed_when: false
      check_mode: false
      when:
        - not (is_wsl | bool)
        - nvidia_gpu_detect.stdout | default('') | length > 0

    - name: Register NVIDIA runtime with docker (nvidia-ctk merges into daemon.json)
      become: true
      ansible.builtin.command:
        cmd: nvidia-ctk runtime configure --runtime=docker
      changed_when: true
      when:
        - not (is_wsl | bool)
        - nvidia_gpu_detect.stdout | default('') | length > 0
        - "'nvidia' not in (docker_daemon_raw.content | default('') | b64decode)"
      notify: docker_changed

    - name: Configure journald - limit log storage
      become: true
      ansible.builtin.lineinfile:
        path: /etc/systemd/journald.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^#?SystemMaxUse=', line: 'SystemMaxUse=256M' }
        - { regexp: '^#?SystemMaxFileSize=', line: 'SystemMaxFileSize=32M' }
      loop_control:
        label: "{{ item.line }}"
